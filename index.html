<html lang="en">
  <head>
    <!-- Add a comment here -->
    <meta charset="UTF-8" />
    <title>Backpacking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="header-container">
      <h1>Backpacking</h1>
      <h2>An Appreciation for the Little Things</h2>
    </div>
    <div class="animation-container">
      <div class="human">
        <div class="hat"></div>
        <div class="hat-bill"></div>
        <div class="head"></div>
        <div class="neck"></div>
        <div class="torso"></div>
        <div class="backpack"></div>
        <div class="sleeping-bag"></div>
        <div class="left-arm"></div>
        <div class="right-arm"></div>
        <div class="left-leg"></div>
        <div class="right-leg"></div>
      </div>
      <div class="sliding-background"></div>
    </div>
    <div class="gridbox-container">
      <div class="element1 grid-box">
        <img
          class="image"
          src="./images/echo-lake.jpg"
          alt="Echo Lake Trinity Alps"
        />
      </div>
      <div class="element2 grid-box">
        <img
          class="image"
          src="./images/echo-lake.jpg"
          alt="Echo Lake Trinity Alps"
        />
      </div>
      <div class="element3 grid-box">3</div>
      <div class="element4 grid-box">4</div>
      <div class="element5 grid-box">5</div>
      <div class="element6 grid-box">6</div>
      <div class="element7 grid-box">7</div>
      <div class="element8 grid-box">8</div>
    </div>
  </body>
</html>
